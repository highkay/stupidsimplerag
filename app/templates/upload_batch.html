{% extends "base.html" %}

{% block content %}
<section class="grid gap-6 xl:grid-cols-[0.95fr_1.05fr]">
    <div class="surface-card">
        <div class="section-heading">
            <div>
                <span class="soft-label">批量入库</span>
                <h1 class="section-title">同一批次统一 scope，结果里保留每个文件的状态与 `doc_hash`。</h1>
            </div>
            <span class="badge badge-secondary badge-outline">Batch</span>
        </div>

        <form
            method="post"
            action="/ui/ingest/batch"
            hx-post="/ui/ingest/batch"
            hx-target="#batch-result"
            hx-swap="innerHTML transition:true"
            hx-indicator="#global-indicator"
            hx-encoding="multipart/form-data"
            hx-sync="closest form:queue"
            hx-disabled-elt="fieldset, button"
            enctype="multipart/form-data"
            data-busy-text="批量入库中..."
            class="space-y-5"
        >
            <fieldset class="space-y-4">
                <label class="form-control">
                    <div class="label px-0">
                        <span class="label-text font-medium">文件</span>
                        <span class="label-text-alt">支持多选 `.md` / `.txt`</span>
                    </div>
                    <input type="file" id="files" name="files" multiple accept=".md,.txt" class="file-input file-input-bordered w-full" required>
                </label>

                <label class="form-control">
                    <div class="label px-0">
                        <span class="label-text">Scope</span>
                        <span class="label-text-alt">整批共用</span>
                    </div>
                    <input type="text" name="scope" placeholder="reports/2026" class="input input-bordered w-full">
                </label>

                <label class="toggle-row">
                    <span>
                        <strong>覆盖更新</strong>
                        <small>同名文档先删再重建</small>
                    </span>
                    <input type="checkbox" name="force_update" value="true" class="checkbox checkbox-warning checkbox-sm">
                </label>
            </fieldset>

            <div class="action-row justify-between">
                <p class="text-sm text-base-content/65">适合回填目录、按 scope 切仓，或批量转换后的导入。</p>
                <button type="submit" class="btn btn-secondary">批量入库</button>
            </div>
        </form>
    </div>

    <div class="space-y-4">
        <div id="batch-result">
            {% include "partials/batch_result.html" %}
        </div>

        <div class="surface-card">
            <div class="section-heading">
                <div>
                    <span class="soft-label">批量提示</span>
                    <h2 class="section-title">什么时候用这页</h2>
                </div>
            </div>
            <ul class="compact-list">
                <li>需要统一 scope 回填一批文档。</li>
                <li>想观察哪些文件 `ok / skipped / error`。</li>
                <li>需要把返回的 `doc_hash` 继续喂给 grounding。</li>
            </ul>
        </div>
    </div>
</section>
{% endblock %}
