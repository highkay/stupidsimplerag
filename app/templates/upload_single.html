{% extends "base.html" %}

{% block content %}
<section class="grid gap-6 xl:grid-cols-[0.95fr_1.05fr]">
    <div class="surface-card">
        <div class="section-heading">
            <div>
                <span class="soft-label">单文件入库</span>
                <h1 class="section-title">上传后直接拿到 `doc_hash`，后续可用来做 grounding。</h1>
            </div>
            <span class="badge badge-primary badge-outline">Ingest</span>
        </div>

        <form
            method="post"
            action="/ui/ingest"
            hx-post="/ui/ingest"
            hx-target="#upload-result"
            hx-swap="innerHTML transition:true"
            hx-indicator="#global-indicator"
            hx-encoding="multipart/form-data"
            hx-sync="closest form:replace"
            hx-disabled-elt="fieldset, button"
            enctype="multipart/form-data"
            data-busy-text="正在分析并入库..."
            class="space-y-5"
        >
            <fieldset class="space-y-4">
                <label class="form-control">
                    <div class="label px-0">
                        <span class="label-text font-medium">文件</span>
                        <span class="label-text-alt">支持 `.md` / `.txt`</span>
                    </div>
                    <input type="file" id="file" name="file" accept=".md,.txt" class="file-input file-input-bordered w-full" required>
                </label>

                <label class="form-control">
                    <div class="label px-0">
                        <span class="label-text">Scope</span>
                        <span class="label-text-alt">可选</span>
                    </div>
                    <input type="text" name="scope" placeholder="reports/2026" class="input input-bordered w-full">
                </label>

                <label class="toggle-row">
                    <span>
                        <strong>覆盖更新</strong>
                        <small>同名文档先删再重建</small>
                    </span>
                    <input type="checkbox" name="force_update" value="true" class="checkbox checkbox-warning checkbox-sm">
                </label>
            </fieldset>

            <div class="action-row justify-between">
                <p class="text-sm text-base-content/65">后端会做切分、摘要、关键词和 metadata 注入。</p>
                <button type="submit" class="btn btn-primary">开始入库</button>
            </div>
        </form>
    </div>

    <div class="space-y-4">
        <div id="upload-result">
            {% include "partials/upload_result.html" %}
        </div>

        <div class="surface-card">
            <div class="section-heading">
                <div>
                    <span class="soft-label">最短路径</span>
                    <h2 class="section-title">建议顺序</h2>
                </div>
            </div>
            <ol class="steps steps-vertical text-sm">
                <li class="step step-primary">上传文档并记录 `doc_hash`</li>
                <li class="step step-primary">必要时去检索页验证命中</li>
                <li class="step step-primary">在 Grounding 页按 `doc_hash` 做证据裁决</li>
            </ol>
        </div>
    </div>
</section>
{% endblock %}
