{% extends "base.html" %}

{% block content %}
<section class="grid gap-6 xl:grid-cols-[0.95fr_1.15fr]">
    <div class="surface-card">
        <div class="section-heading">
            <div>
                <span class="soft-label">检索面板</span>
                <h1 class="section-title">标准检索与 LOD 两阶段共用一张表单。</h1>
            </div>
            <span class="badge badge-primary badge-outline">Query</span>
        </div>

        <form
            method="post"
            action="/ui/chat/query"
            hx-post="/ui/chat/query"
            hx-target="#chat-result"
            hx-swap="innerHTML transition:true"
            hx-indicator="#global-indicator"
            hx-sync="closest form:queue"
            hx-disabled-elt="fieldset, button"
            hx-on::afterRequest="document.getElementById('chat-result')?.scrollIntoView({behavior:'smooth', block:'start'})"
            data-busy-text="正在检索..."
            class="space-y-5"
        >
            <fieldset class="space-y-5">
                <div class="space-y-3">
                    <div class="label px-0 py-0">
                        <span class="label-text font-medium">模式</span>
                        <span class="label-text-alt">标准检索默认更快</span>
                    </div>
                    <div class="mode-switch">
                        <label class="mode-option">
                            <input type="radio" name="query_mode" value="chat" checked>
                            <span>
                                <strong>标准检索</strong>
                                <small>Hybrid + 可选 rerank / generation</small>
                            </span>
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="query_mode" value="lod">
                            <span>
                                <strong>LOD 两阶段</strong>
                                <small>先筛文档，再聚焦生成</small>
                            </span>
                        </label>
                    </div>
                </div>

                <label class="form-control">
                    <div class="label px-0">
                        <span class="label-text font-medium">问题</span>
                        <span class="label-text-alt text-primary">必填</span>
                    </div>
                    <input
                        type="text"
                        id="query"
                        name="query"
                        placeholder="例如：英伟达最新财报表现，或 2026 年光模块景气度变化"
                        class="input input-bordered w-full"
                        required
                    >
                </label>

                <div class="grid gap-3 md:grid-cols-2">
                    <label class="form-control">
                        <div class="label px-0"><span class="label-text">起始日期</span></div>
                        <input type="date" name="start_date" class="input input-bordered w-full">
                    </label>
                    <label class="form-control">
                        <div class="label px-0"><span class="label-text">结束日期</span></div>
                        <input type="date" name="end_date" class="input input-bordered w-full">
                    </label>
                </div>

                <details class="collapse collapse-arrow bg-base-200/80 border border-base-300/70">
                    <summary class="collapse-title text-sm font-semibold">过滤与开关</summary>
                    <div class="collapse-content space-y-4">
                        <div class="grid gap-3 md:grid-cols-2">
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="checkbox checkbox-sm" name="skip_rerank">
                                <span class="text-sm">跳过 rerank</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="checkbox checkbox-sm" name="skip_generation">
                                <span class="text-sm">仅返回切片</span>
                            </label>
                        </div>

                        <div class="grid gap-3">
                            <label class="form-control">
                                <div class="label px-0"><span class="label-text">Scope</span></div>
                                <input type="text" name="scope" placeholder="reports/2026" class="input input-bordered w-full">
                            </label>
                            <div class="grid gap-3 md:grid-cols-2">
                                <label class="form-control">
                                    <div class="label px-0"><span class="label-text">文件名精确匹配</span></div>
                                    <input type="text" name="filename" placeholder="20250228_NVIDIA_Report.md" class="input input-bordered w-full">
                                </label>
                                <label class="form-control">
                                    <div class="label px-0"><span class="label-text">文件名包含</span></div>
                                    <input type="text" name="filename_contains" placeholder="NVIDIA" class="input input-bordered w-full">
                                </label>
                            </div>
                            <div class="grid gap-3 md:grid-cols-2">
                                <label class="form-control">
                                    <div class="label px-0"><span class="label-text">任意关键词</span></div>
                                    <input type="text" name="keywords_any" placeholder="NVDA, 英伟达, GPU" class="input input-bordered w-full">
                                </label>
                                <label class="form-control">
                                    <div class="label px-0"><span class="label-text">全部关键词</span></div>
                                    <input type="text" name="keywords_all" placeholder="数据中心, 盈利" class="input input-bordered w-full">
                                </label>
                            </div>
                        </div>
                    </div>
                </details>
            </fieldset>

            <div class="action-row justify-between">
                <p class="text-sm text-base-content/65">标准模式适合直接问答；LOD 更适合宽问题先缩小文档范围。</p>
                <button type="submit" class="btn btn-primary">执行检索</button>
            </div>
        </form>
    </div>

    <div class="space-y-4">
        <div id="chat-result">
            {% include "partials/chat_result.html" %}
        </div>
    </div>
</section>
{% endblock %}
